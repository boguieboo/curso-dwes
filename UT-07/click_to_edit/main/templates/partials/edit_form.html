<form hx-post="{% url 'save_name' %}" hx-target="this" hx-swap="outerHTML">

  {% csrf_token %}

  <div>
    <label>First Name</label>
    <input type="text" name="firstName" value="{{ user.first }}">
  </div>
  <div class="form-group">
    <label>Last Name</label>
    <input type="text" name="lastName" value="{{ user.last }}">
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" name="email" value="{{ user.email }}">
  </div>
  <div class="form-group">
    <label>Phone Number</label>
    <input type="text" name="numero_telefono" value="{{ user.numero_telefono }}">
  <button class="btn" type="submit">Submit</button>
  <button class="btn" hx-get="{% url 'display_name' %}">Cancel</button>
</form>
